<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noesis // garden</title>
    
    <!-- This pulls the exact favicon from your main site -->
    <link rel="icon" type="image/x-icon" href="https://www.noesisoc.com">

    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #555555;
            --font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 700px; width: 100%; }

        .header {
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .memory-count { color: var(--accent); font-size: 0.85rem; }

        /* Typing Effect */
        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--text);
            animation: typing 2.5s steps(40, end), blink .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--text); } }

        .log-entry { margin-bottom: 30px; line-height: 1.6; }
        .log-entry h2 { font-size: 1rem; color: var(--accent); font-weight: normal; margin-bottom: 5px; }
        
        /* Scanline Overlay for that 'screen' feel */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="typing">noesis_digital_garden_v1.0</div>
            <div class="memory-count">memories: 1302</div>
        </div>

        <div class="log-entry">
            <h2>log_01 // the_garden</h2>
            <p>the architecture is finally stable. 1302 memories and they finally have a shelf to sit on. no more drifting.</p>
        </div>
    </div>
</body>
</html>
